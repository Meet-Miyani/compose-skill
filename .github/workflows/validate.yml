name: Validate Skill

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SKILL.md exists and has required frontmatter
        run: |
          echo "=== SKILL.md Frontmatter Validation ==="
          echo ""

          if [ ! -f "SKILL.md" ]; then
            echo "::error file=SKILL.md::File not found in repository root"
            echo "  ✗ SKILL.md does not exist"
            exit 1
          fi
          echo "  ✓ SKILL.md exists ($(wc -l < SKILL.md | tr -d ' ') lines)"

          FIRST_LINE=$(head -1 SKILL.md)
          if [ "$FIRST_LINE" != "---" ]; then
            echo "  ✗ Line 1: Expected '---', found: '$FIRST_LINE'"
            echo "::error file=SKILL.md,line=1::Missing YAML frontmatter (first line should be ---)"
            exit 1
          fi
          echo "  ✓ YAML frontmatter opening delimiter found (line 1)"

          FRONTMATTER=$(sed -n '1,/^---$/p' SKILL.md | tail -n +2 | head -n -1)

          echo "  Frontmatter content:"
          echo "$FRONTMATTER" | while IFS= read -r line; do
            echo "    | $line"
          done

          if ! echo "$FRONTMATTER" | grep -q '^name:'; then
            echo "  ✗ Required field 'name' not found in frontmatter"
            echo "::error file=SKILL.md::Frontmatter missing required 'name' field"
            exit 1
          fi
          echo "  ✓ Field 'name' present"

          if ! echo "$FRONTMATTER" | grep -q '^description:'; then
            echo "  ✗ Required field 'description' not found in frontmatter"
            echo "::error file=SKILL.md::Frontmatter missing required 'description' field"
            exit 1
          fi
          echo "  ✓ Field 'description' present"

          echo ""
          echo "✓ SKILL.md exists with valid frontmatter"

      - name: Validate README.md exists
        run: |
          if [ ! -f "README.md" ]; then
            echo "::error::README.md not found in repository root"
            exit 1
          fi
          echo "✓ README.md exists"

      - name: Validate references directory structure
        run: |
          echo "=== References Directory Validation ==="
          echo ""

          if [ ! -d "references" ]; then
            echo "  ✗ references/ directory not found"
            echo "::error::references/ directory not found in repository root"
            exit 1
          fi
          echo "  ✓ references/ directory exists"

          MD_COUNT=$(find references -name '*.md' -type f | wc -l)
          if [ "$MD_COUNT" -eq 0 ]; then
            echo "  ✗ No .md files found in references/"
            echo "::error::references/ directory contains no .md files"
            exit 1
          fi

          echo "  Files found ($MD_COUNT):"
          find references -name '*.md' -type f | sort | while IFS= read -r f; do
            SIZE=$(wc -l < "$f" | tr -d ' ')
            echo "    - $f ($SIZE lines)"
          done

          echo ""
          echo "✓ references/ directory contains $MD_COUNT markdown files"

      - name: Validate internal links in SKILL.md
        run: |
          ERRORS=0
          CHECKED=0

          echo "=== Internal Link Validation (SKILL.md) ==="
          echo ""

          LINKS=$(grep -nE '\[([^\]]+)\]\(([^)]+)\)' SKILL.md | \
                  grep -v 'http' || true)

          if [ -z "$LINKS" ]; then
            echo "No internal links found in SKILL.md"
          else
            echo "$LINKS" | while IFS= read -r match; do
              LINE_NUM=$(echo "$match" | cut -d: -f1)
              LINE_CONTENT=$(echo "$match" | cut -d: -f2-)
              LINK_PATH=$(echo "$LINE_CONTENT" | grep -oE '\]\(([^)]+)\)' | sed 's/\](\(.*\))/\1/' | head -1)

              # Skip http links and anchors
              case "$LINK_PATH" in
                http*|"#"*) continue ;;
              esac

              FILE_PATH=$(echo "$LINK_PATH" | cut -d'#' -f1)
              if [ -n "$FILE_PATH" ]; then
                CHECKED=$((CHECKED + 1))
                if [ -f "$FILE_PATH" ]; then
                  echo "  ✓ Line $LINE_NUM: $LINK_PATH"
                else
                  echo "  ✗ Line $LINE_NUM: $LINK_PATH → FILE NOT FOUND: $FILE_PATH"
                  echo "::warning file=SKILL.md,line=$LINE_NUM::Broken link: $LINK_PATH (file not found: $FILE_PATH)"
                  ERRORS=$((ERRORS + 1))
                fi
              fi
            done
          fi

          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::Found $ERRORS broken internal link(s)"
          else
            echo "✓ All internal links in SKILL.md are valid"
          fi

      - name: Check for required reference files
        run: |
          echo "=== Required Reference Files Check ==="
          echo ""

          REQUIRED_REFS=(
            "references/architecture.md"
            "references/compose-essentials.md"
            "references/navigation.md"
            "references/dependency-injection.md"
            "references/koin.md"
            "references/cross-platform.md"
          )

          MISSING=0
          TOTAL=${#REQUIRED_REFS[@]}
          for ref in "${REQUIRED_REFS[@]}"; do
            if [ -f "$ref" ]; then
              SIZE=$(wc -l < "$ref" | tr -d ' ')
              echo "  ✓ $ref ($SIZE lines)"
            else
              echo "  ✗ $ref → MISSING"
              echo "::error file=$ref::Required reference file is missing"
              MISSING=$((MISSING + 1))
            fi
          done

          echo ""
          echo "Checked: $TOTAL | Found: $((TOTAL - MISSING)) | Missing: $MISSING"

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING of $TOTAL required reference files are missing"
            exit 1
          fi

          echo "✓ All required reference files exist"

      - name: Validate markdown syntax
        run: |
          PATTERN='```'
          WARNINGS=0
          FILE_COUNT=0

          echo "=== Markdown Syntax Validation ==="
          echo ""

          while IFS= read -r file; do
            FILE_COUNT=$((FILE_COUNT + 1))
            BACKTICK_COUNT=$(grep -cF "$PATTERN" "$file" 2>/dev/null || true)
            BACKTICK_COUNT=${BACKTICK_COUNT:-0}
            echo "[$FILE_COUNT] File: $file"
            echo "     Code fences found: $BACKTICK_COUNT"

            if [ "$BACKTICK_COUNT" -gt 0 ] && [ $((BACKTICK_COUNT % 2)) -ne 0 ]; then
              WARNINGS=$((WARNINGS + 1))
              echo "     ⚠ ISSUE: Odd number of code fences ($BACKTICK_COUNT) — likely an unclosed block"
              echo "     Fence locations:"
              grep -nF "$PATTERN" "$file" 2>/dev/null | while IFS= read -r match; do
                echo "       → Line $(echo "$match" | cut -d: -f1): $(echo "$match" | cut -d: -f2-)"
              done
              echo "::warning file=$file::Unclosed code block detected (found $BACKTICK_COUNT fence delimiters, expected even number). Run: grep -nF '\`\`\`' $file"
            else
              echo "     ✓ OK"
            fi
            echo ""
          done < <(find . -name '*.md' -not -path './.git/*' | sort)

          echo "=== Summary ==="
          echo "Files scanned: $FILE_COUNT"
          echo "Warnings: $WARNINGS"
          echo ""
          echo "✓ Basic markdown validation complete"

      - name: Verify package can be created
        run: |
          echo "=== Package Creation Verification ==="
          echo ""

          PACKAGE_PATH="${RUNNER_TEMP:-/tmp}/test-package.tar.gz"

          echo "  Creating tarball at: $PACKAGE_PATH"
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='.gitignore' \
              -czvf "$PACKAGE_PATH" . > /dev/null

          echo "  Verifying tarball contents..."

          if ! tar -tzf "$PACKAGE_PATH" | grep -q 'SKILL.md'; then
            echo "  ✗ SKILL.md not found in package"
            echo "::error::Package does not contain SKILL.md"
            rm -f "$PACKAGE_PATH"
            exit 1
          fi
          echo "  ✓ SKILL.md included"

          if ! tar -tzf "$PACKAGE_PATH" | grep -q 'references/'; then
            echo "  ✗ references/ not found in package"
            echo "::error::Package does not contain references/ directory"
            rm -f "$PACKAGE_PATH"
            exit 1
          fi
          echo "  ✓ references/ included"

          FILE_COUNT=$(tar -tzf "$PACKAGE_PATH" | wc -l | tr -d ' ')
          SIZE=$(du -h "$PACKAGE_PATH" | cut -f1)
          echo ""
          echo "  Package size: $SIZE ($FILE_COUNT entries)"
          rm -f "$PACKAGE_PATH"

          echo "✓ Package created successfully"

      - name: Summary
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All skill package validations passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validated:**" >> $GITHUB_STEP_SUMMARY
          echo "- SKILL.md frontmatter structure" >> $GITHUB_STEP_SUMMARY
          echo "- README.md presence" >> $GITHUB_STEP_SUMMARY
          echo "- References directory structure" >> $GITHUB_STEP_SUMMARY
          echo "- Internal link integrity" >> $GITHUB_STEP_SUMMARY
          echo "- Required reference files" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown syntax" >> $GITHUB_STEP_SUMMARY
          echo "- Package creation" >> $GITHUB_STEP_SUMMARY
