name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate core files and frontmatter
        run: |
          echo "=== Core File Validation ==="
          echo ""
          ERRORS=0

          # --- SKILL.md ---
          if [ ! -f "SKILL.md" ]; then
            echo "  ✗ SKILL.md does not exist"
            echo "::error file=SKILL.md::File not found in repository root"
            ERRORS=$((ERRORS + 1))
          else
            echo "  ✓ SKILL.md exists ($(wc -l < SKILL.md | tr -d ' ') lines)"

            FIRST_LINE=$(head -1 SKILL.md)
            if [ "$FIRST_LINE" != "---" ]; then
              echo "  ✗ SKILL.md line 1: Expected '---', found: '$FIRST_LINE'"
              echo "::error file=SKILL.md,line=1::Missing YAML frontmatter (first line should be ---)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ YAML frontmatter opening delimiter found (line 1)"

              FRONTMATTER=$(sed -n '1,/^---$/p' SKILL.md | tail -n +2 | head -n -1)
              echo "  Frontmatter content:"
              echo "$FRONTMATTER" | while IFS= read -r line; do
                echo "    | $line"
              done

              if ! echo "$FRONTMATTER" | grep -q '^name:'; then
                echo "  ✗ Required field 'name' not found in frontmatter"
                echo "::error file=SKILL.md::Frontmatter missing required 'name' field"
                ERRORS=$((ERRORS + 1))
              else
                echo "  ✓ Field 'name' present"
              fi

              if ! echo "$FRONTMATTER" | grep -q '^description:'; then
                echo "  ✗ Required field 'description' not found in frontmatter"
                echo "::error file=SKILL.md::Frontmatter missing required 'description' field"
                ERRORS=$((ERRORS + 1))
              else
                echo "  ✓ Field 'description' present"
              fi
            fi
          fi

          echo ""

          # --- README.md ---
          if [ ! -f "README.md" ]; then
            echo "  ✗ README.md does not exist"
            echo "::error file=README.md::File not found in repository root"
            ERRORS=$((ERRORS + 1))
          else
            echo "  ✓ README.md exists ($(wc -l < README.md | tr -d ' ') lines)"
          fi

          echo ""

          # --- references/ directory ---
          if [ ! -d "references" ]; then
            echo "  ✗ references/ directory not found"
            echo "::error::references/ directory not found in repository root"
            ERRORS=$((ERRORS + 1))
          else
            MD_COUNT=$(find references -name '*.md' -type f | wc -l | tr -d ' ')
            if [ "$MD_COUNT" -eq 0 ]; then
              echo "  ✗ No .md files found in references/"
              echo "::error::references/ directory contains no .md files"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ references/ directory exists ($MD_COUNT markdown files)"
              find references -name '*.md' -type f | sort | while IFS= read -r f; do
                SIZE=$(wc -l < "$f" | tr -d ' ')
                echo "    - $f ($SIZE lines)"
              done
            fi
          fi

          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "✗ $ERRORS error(s) found in core file validation"
            exit 1
          fi
          echo "✓ Core file validation passed"

      - name: Validate links and references from SKILL.md
        run: |
          ERRORS=0
          CHECKED=0

          echo "=== Internal Link Validation (SKILL.md) ==="
          echo ""

          # Extract all markdown links with line numbers, excluding external URLs
          LINKS=$(grep -nE '\[([^\]]+)\]\(([^)]+)\)' SKILL.md | grep -v 'http' || true)

          if [ -z "$LINKS" ]; then
            echo "  No internal links found in SKILL.md"
          else
            echo "$LINKS" | while IFS= read -r match; do
              LINE_NUM=$(echo "$match" | cut -d: -f1)
              LINE_CONTENT=$(echo "$match" | cut -d: -f2-)
              LINK_PATH=$(echo "$LINE_CONTENT" | grep -oE '\]\(([^)]+)\)' | sed 's/\](\(.*\))/\1/' | head -1)

              case "$LINK_PATH" in
                http*|"#"*) continue ;;
              esac

              FILE_PATH=$(echo "$LINK_PATH" | cut -d'#' -f1)
              if [ -n "$FILE_PATH" ]; then
                CHECKED=$((CHECKED + 1))
                if [ -f "$FILE_PATH" ]; then
                  SIZE=$(wc -l < "$FILE_PATH" | tr -d ' ')
                  echo "  ✓ Line $LINE_NUM: $LINK_PATH ($SIZE lines)"
                else
                  echo "  ✗ Line $LINE_NUM: $LINK_PATH → FILE NOT FOUND"
                  echo "::error file=SKILL.md,line=$LINE_NUM::Broken link: $LINK_PATH (file does not exist)"
                  ERRORS=$((ERRORS + 1))
                fi
              fi
            done
          fi

          echo ""

          # Dynamically derive required references from SKILL.md links
          echo "=== Required References (derived from SKILL.md) ==="
          echo ""
          REF_LINKS=$(grep -oE '\]\(references/[^)]+\)' SKILL.md | sed 's/\](\(.*\))/\1/' | cut -d'#' -f1 | sort -u)
          MISSING=0
          TOTAL=0

          if [ -z "$REF_LINKS" ]; then
            echo "  No references/ links found in SKILL.md"
          else
            for ref in $REF_LINKS; do
              TOTAL=$((TOTAL + 1))
              if [ -f "$ref" ]; then
                SIZE=$(wc -l < "$ref" | tr -d ' ')
                echo "  ✓ $ref ($SIZE lines)"
              else
                echo "  ✗ $ref → MISSING"
                echo "::error file=$ref::Referenced in SKILL.md but file does not exist"
                MISSING=$((MISSING + 1))
              fi
            done
          fi

          echo ""
          echo "References linked: $TOTAL | Found: $((TOTAL - MISSING)) | Missing: $MISSING"

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING of $TOTAL referenced files are missing"
            exit 1
          fi

          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "✗ $ERRORS broken link(s) found"
            exit 1
          fi
          echo "✓ All links and references valid"

      - name: Lint markdown
        run: |
          echo "=== Markdown Lint ==="
          echo ""

          npm install --no-save markdownlint-cli 2>/dev/null
          echo ""

          # MD013: line length — disabled (reference docs have long lines by design)
          # MD024: no duplicate headings — disabled (common in reference docs)
          # MD033: no inline HTML — disabled (used for anchors/badges)
          # MD041: first line heading — disabled (SKILL.md starts with frontmatter)
          # MD036: no emphasis as heading - disabled (used stylistically)
          npx markdownlint '**/*.md' \
            --disable MD013 MD024 MD033 MD041 MD036 \
            2>&1 | tee lint-output.txt || true

          ISSUE_COUNT=$(wc -l < lint-output.txt | tr -d ' ')
          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠ $ISSUE_COUNT lint issue(s) found (non-blocking)"

            while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE_NUM=$(echo "$line" | cut -d: -f2)
              MSG=$(echo "$line" | cut -d: -f3-)
              echo "::warning file=$FILE,line=$LINE_NUM::$MSG"
            done < lint-output.txt
          else
            echo "  No issues found"
          fi

          rm -f lint-output.txt
          echo ""
          echo "✓ Markdown lint complete"

      - name: Verify package can be created
        run: |
          echo "=== Package Creation Verification ==="
          echo ""

          PACKAGE_PATH="${RUNNER_TEMP:-/tmp}/test-package.tar.gz"

          echo "  Creating tarball at: $PACKAGE_PATH"
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='.gitignore' \
              -czvf "$PACKAGE_PATH" . > /dev/null

          echo "  Verifying tarball contents..."

          if ! tar -tzf "$PACKAGE_PATH" | grep -q 'SKILL.md'; then
            echo "  ✗ SKILL.md not found in package"
            echo "::error::Package does not contain SKILL.md"
            rm -f "$PACKAGE_PATH"
            exit 1
          fi
          echo "  ✓ SKILL.md included"

          if ! tar -tzf "$PACKAGE_PATH" | grep -q 'references/'; then
            echo "  ✗ references/ not found in package"
            echo "::error::Package does not contain references/ directory"
            rm -f "$PACKAGE_PATH"
            exit 1
          fi
          echo "  ✓ references/ included"

          FILE_COUNT=$(tar -tzf "$PACKAGE_PATH" | wc -l | tr -d ' ')
          SIZE=$(du -h "$PACKAGE_PATH" | cut -f1)
          echo ""
          echo "  Package size: $SIZE ($FILE_COUNT entries)"
          rm -f "$PACKAGE_PATH"

          echo "✓ Package created successfully"

      - name: Summary
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All skill package validations passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validated:**" >> $GITHUB_STEP_SUMMARY
          echo "- SKILL.md frontmatter structure" >> $GITHUB_STEP_SUMMARY
          echo "- README.md presence" >> $GITHUB_STEP_SUMMARY
          echo "- References directory structure" >> $GITHUB_STEP_SUMMARY
          echo "- Internal link integrity (derived from SKILL.md)" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown lint (markdownlint-cli)" >> $GITHUB_STEP_SUMMARY
          echo "- Package creation" >> $GITHUB_STEP_SUMMARY
